# /etc/freeradius/3.0/clients.conf
# NAS Clients — อุปกรณ์ที่ส่ง RADIUS request มาที่ FreeRADIUS
#
# Server: rasberrypi-888 (10.1.10.10)
# Synced from server: 2026-03-03

# ===== Localhost (สำหรับ radtest) =====
client localhost {
    ipaddr = 127.0.0.1
    proto = *
    secret = testing123
    require_message_authenticator = yes
    nas_type = other
    limit {
        max_connections = 16
        lifetime = 0
        idle_timeout = 900
    }
}

# IPv6 Localhost
client localhost_ipv6 {
    ipv6addr = ::1
    secret = testing123
}

# ===== Wireless LAN Controller =====
client WLC {
    ipaddr = 10.1.50.10
    secret = WLC2500
    # WLC ส่ง 802.1X requests สำหรับ VLAN 30 (STAFF-WIFI)
}

# ===== Cisco Firepower FTD (Identity Policy) =====
client Cisco_FTD {
    ipaddr = 10.1.1.2
    secret = testing123
    require_message_authenticator = true
}

# ===== Management Device =====
client MGMT_Device {
    ipaddr = 10.1.50.20
    secret = testing123
    require_message_authenticator = no
}

# ===== Server VLAN (10.1.10.0/24) =====
client Local_Subnet {
    ipaddr = 10.1.10.0/24
    secret = testing123
}
