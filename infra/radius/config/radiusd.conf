# /etc/freeradius/3.0/radiusd.conf
# FreeRADIUS 3.2.7 Main Configuration — Group 1 NetOps
#
# Server: rasberrypi-888 (10.1.10.10)
# Synced from server: 2026-03-03
#
# NOTE: Server ใช้ default radiusd.conf ของ FreeRADIUS 3.2.7
# ไฟล์นี้เป็น reference ของ key settings เท่านั้น
# Full config อยู่บน server ที่ /etc/freeradius/3.0/radiusd.conf

prefix = /usr
exec_prefix = /usr
sysconfdir = /etc
localstatedir = /var
sbindir = ${exec_prefix}/sbin
logdir = /var/log/freeradius
raddbdir = /etc/freeradius
radacctdir = ${logdir}/radacct
run_dir = ${localstatedir}/run/freeradius

# --- Logging ---
log {
    destination = stdout       # Docker-friendly / debug mode: log to stdout
    colourise = yes
    file = ${logdir}/radius.log
    syslog_facility = daemon
    stripped_names = no
    auth = yes                 # Log authentication requests
    auth_badpass = yes         # Log failed passwords (debug)
    auth_goodpass = no         # Don't log successful passwords
}

# --- Security ---
security {
    max_attributes = 200
    reject_delay = 1
    status_server = yes
}

# --- Thread Pool ---
thread pool {
    start_servers = 5
    max_servers = 32
    min_spare_servers = 3
    max_spare_servers = 10
    max_requests_per_server = 0
}

# --- Module / Site includes ---
$INCLUDE clients.conf

# Load modules
modules {
    $INCLUDE mods-enabled/
}

# Load virtual servers (sites)
# sites-enabled/default      — Main server (1812/1813)
# sites-enabled/inner-tunnel — PEAP/TTLS inner auth (18120)
#
# Inner-tunnel authorize flow:
#   filter_username → suffix → eap → files → -sql → ldap → mschap → pap
#
# Inner-tunnel authenticate:
#   Auth-Type MS-CHAP { mschap }  ← ntlm_auth → Samba4 AD
#   eap
