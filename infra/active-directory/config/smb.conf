# /etc/samba/smb.conf
# Samba4 Active Directory Domain Controller — GROUP1.CORP
#
# Host: raspberrypi (10.1.10.20)
# Provisioned domain: GROUP1.CORP
# NetBIOS: RASPBERRYPI
# Deployment: Native (systemd samba-ad-dc.service)
#
# Synced from server: 2026-03-03

[global]
    # ===== LDAP =====
    # อนุญาต simple bind (ไม่ต้อง LDAPS) — สำหรับ FreeRADIUS ldap module
    ldap server require strong auth = no

    # ===== Domain Settings =====
    workgroup = GROUP1
    realm = GROUP1.CORP
    netbios name = RASPBERRYPI
    server role = active directory domain controller

    # ===== DNS =====
    dns forwarder = 8.8.8.8

    # ===== NTLM Authentication =====
    # ต้องเป็น "yes" เพื่อให้ FreeRADIUS ใช้ ntlm_auth สำหรับ MSCHAPv2
    # ถ้าต้องการ restrict เฉพาะ NTLMv2: ntlm auth = mschapv2-and-ntlmv2-only
    ntlm auth = yes

    # ===== ID Mapping =====
    idmap_ldb:use rfc2307 = yes

    # ===== Logging =====
    logging = syslog
    syslog = 3
    log level = 3

[sysvol]
    path = /var/lib/samba/sysvol
    read only = No

[netlogon]
    path = /var/lib/samba/sysvol/group1.corp/scripts
    read only = No
